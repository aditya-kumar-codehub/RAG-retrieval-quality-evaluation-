services:
  - type: web
    name: rag-eval-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: RAG_EVAL_BACKEND
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://rag-eval-frontend-rjxu.onrender.com"
      - key: GENERATE_RATE_LIMIT
        value: "5/hour"
      - key: RETRIEVE_RATE_LIMIT
        value: "60/hour"
      - key: LIVE_STRATEGIES
        value: "bm25"

  - type: web
    name: rag-eval-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://rag-eval-backend-msep.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
